name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Lint client
        run: npx eslint src --ext .js,.jsx
        working-directory: client

      - name: Build client
        run: npx vite build
        working-directory: client
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  kics-scan:
    name: KICS IaC Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run KICS scan
        uses: checkmarx/kics-github-action@v2
        with:
          path: infrastructure
          fail_on: high
          output_path: kics-results
          output_formats: sarif

      - name: Upload KICS results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: kics-results/results.sarif

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=rag/dev/terraform.tfstate"
        working-directory: infrastructure
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="app_name=rateyourres-rag" \
            -var="environment=dev" \
            -var="aws_region=af-south-1" \
            -var="instance_type=t3.micro"
        working-directory: infrastructure
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_vpc_id: ${{ secrets.TF_VAR_vpc_id }}
          TF_VAR_subnet_id: ${{ secrets.TF_VAR_subnet_id }}
          TF_VAR_ami_id: ${{ secrets.TF_VAR_ami_id }}
          TF_VAR_public_key: ${{ secrets.TF_VAR_public_key }}